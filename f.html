<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Naksh Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0c29; /* Darker gaming theme */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Garena Background Logo */
        .garena-bg {
            position: absolute;
            width: 80%;
            max-width: 600px;
            opacity: 0.1; /* Transparent look */
            z-index: 0;
            pointer-events: none;
            filter: grayscale(100%) brightness(200%);
        }

        .success-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 450px;
            z-index: 1;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hi-text {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00d2ff;
            margin-bottom: 5px;
        }

        .congrats-text {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(to right, #ff0000, #ff8c00); /* Garena Red/Orange vibe */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0;
        }

        .sub-text {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* Button Styling */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            display: block;
            border: none;
        }

        .primary-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            filter: brightness(1.2);
        }

        .author-name {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Garena_logo.svg/1200px-Garena_logo.svg.png" class="garena-bg" alt="Garena">

    <div class="success-card">
        <div class="hi-text">Thanks for visiting</div>
        
        <div class="congrats-text">BHAG JA YHA SE PDHO LIKHO</div>
        
        <p class="sub-text">Your request has been successfully submitted to the server.</p>

        <div class="btn-container">
            <a href="https://gopalbhi999-crypto.github.io/notes/" class="btn primary-btn">📚 Open Study Notes</a>
            
            <a href="index.html" class="btn secondary-btn">← Back to Home</a>
        </div>

        <div class="author-name">CREATED BY NAKSH</div>
    </div>

</body>
</html>
