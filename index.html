<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Diamond Hub | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background-color: #050505;
            
            /* --- BACKGROUND IMAGE --- */
            /* Isme aapki file ka naam set hai */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                              url('file_000000004e887207a92622a8d0ff5b67.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .elite-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 95%;
            max-width: 420px;
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 12px;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
        }

        .line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
            margin: 20px 0;
        }

        .input-box {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-box label {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
        }

        .input-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-box input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-claim {
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            border: none;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .btn-claim:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .btn-notes {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            display: inline-block;
        }

        .btn-notes:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .credits {
            margin-top: 25px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="elite-card">
        <div class="logo-area">
            <div class="logo-main">FREE FIRE</div>
            <div class="subtitle">Diamond Vault</div>
        </div>

        <div class="line"></div>

        <div class="input-box">
            <label>Master Player UID</label>
            <input type="text" id="uid" placeholder="Enter Player UID">
        </div>

        <div class="input-box">
            <label>Enter Diamonds (Max: 999...)</label>
            <input type="number" id="diamonds" placeholder="Enter Amount" min="1" max="999999999999999">
        </div>

        <div class="btn-container">
            <button onclick="processTransfer()" class="btn-claim">INITIALIZE TRANSFER</button>
            
            <a href="https://gopalbhi999-crypto.github.io/notes/" target="_blank" class="btn-notes">OPEN STUDY NOTES</a>
        </div>

        <div class="credits">
            DEVELOPED BY <b>NAKSH</b><br>
            SECURE TERMINAL ENABLED © 2026
        </div>
    </div>

    <script>
        function processTransfer() {
            var uid = document.getElementById('uid').value;
            var diam = document.getElementById('diamonds').value;
            var limit = 999999999999999;

            if (uid === "" || diam === "") {
                alert("ACCESS DENIED: Please fill all fields.");
                return;
            }

            if (parseFloat(diam) > limit) {
                alert("LIMIT EXCEEDED: Max diamonds allowed is " + limit);
                return;
            }
            
            alert("PROTOCOL STARTED! Redirecting for UID: " + uid);
            window.location.href = "f.html";
        }
    </script>

</body>
</html>
