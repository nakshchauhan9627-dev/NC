<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Diamond Hub | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Background with Animated Gradient */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1e3c72 0%, #111 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 100%;
            max-width: 420px;
            position: relative;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: bold;
            color: #ff9d00;
            text-shadow: 0 0 15px #ff9d00;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 30px;
            letter-spacing: 3px;
            color: #00d2ff;
        }

        /* Input Group Styles */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #aaa;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        /* Buttons Style */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .submit-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        /* Extra Button (External Link) */
        .extra-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .submit-btn:hover, .extra-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        .extra-btn:hover {
            background: #24a1de; /* Telegram Blue color */
            border-color: transparent;
        }

        /* Footer */
        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }

        .gopal-text {
            color: #ff9d00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-box">FREE FIRE</div>
        <h1>DIAMOND GENERATOR</h1>

        <div class="input-group">
            <label>Player UID</label>
            <input type="text" id="uid" placeholder="Enter your UID">
        </div>

        <div class="input-group">
            <label>Diamond Amount</label>
            <input type="number" id="diamonds" placeholder="Enter amount (Up to 1 Arab)">
        </div>

        <div class="btn-container">
            <a href="f.html" class="submit-btn" onclick="return validate()">CLAIM DIAMONDS</a>
            
            <a href="https://gopalbhi999-crypto.github.io/notes/" target="_blank" class="extra-btn">FOR STUDY</a>
        </div>

        <div class="footer-text">
            <p>Developed by <span class="gopal-text">NAKSH</span></p>
            <p>© 2026 Gaming Hub Inc.</p>
        </div>
    </div>

    <script>
        function validate() {
            var uid = document.getElementById('uid').value;
            var diam = document.getElementById('diamonds').value;
            // Aapki requested limit: 100,000,000,000
            var maxLimit = 100000000000; 

            if (uid === "" || diam === "") {
                alert("Opps! Please fill all fields.");
                return false;
            }
            if (parseInt(diam) > maxLimit) {
                alert("Limit exceeded! Max is " + maxLimit);
                return false;
            }
            
            alert("Request Sent! Processing diamonds for UID: " + uid);
            return true;
        }
    </script>

</body>
</html>
