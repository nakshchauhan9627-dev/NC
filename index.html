<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Diamond Hub | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background-color: #050505;
            file_000000004e887207a92622a8d0ff5b67.png
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('YOUR_GITHUB_IMAGE_URL');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Effect for Card */
        .elite-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 45px 35px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 90%;
            max-width: 440px;
            position: relative;
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
            margin: 25px 0;
        }

        .input-box {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-box label {
            font-size: 12px;
            color: #00d2ff;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-box input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .btn-claim {
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            border: none;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .btn-claim:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.5);
        }

        .btn-study {
            margin-top: 15px;
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-study:hover { color: #fff; }

        .credits {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        
        .credits b { color: #00ffcc; }
    </style>
</head>
<body>

    <div class="elite-card">
        <div class="logo-area">
            <div class="logo-main">FREE FIRE</div>
            <div class="subtitle">Diamond Vault</div>
        </div>

        <div class="line"></div>

        <div class="input-box">
            <label>Master Player UID</label>
            <input type="text" id="uid" placeholder="Enter UID here">
        </div>

        <div class="input-box">
            <label>Select Diamond Pack</label>
            <input type="number" id="diamonds" placeholder="Enter Amount">
        </div>

        <button onclick="validate()" class="btn-claim">INITIALIZE TRANSFER</button>
        <a href="https://gopalbhi999-crypto.github.io/notes/" target="_blank" class="btn-study">ACCESS STUDY PORTAL</a>

        <div class="credits">
            DEVELOPED BY <b>NAKSH</b><br>
            SECURE ENCRYPTION ENABLED © 2026
        </div>
    </div>

    <script>
        function validate() {
            var uid = document.getElementById('uid').value;
            var diam = document.getElementById('diamonds').value;
            if (uid === "" || diam === "") {
                alert("Please fill all details!");
                return;
            }
            alert("Protocol Initiated for UID: " + uid);
            window.location.href = "f.html";
        }
    </script>
</body>
</html>
