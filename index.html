<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Diamond Hub</title>
    <style>
        /* Full screen background with premium gradient */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Main Container */
        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        .logo-box {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
            box-sizing: border-box; /* Ensure padding doesn't affect width */
        }

        /* Button Style */
        .submit-btn {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        /* Footer Text */
        .footer-text {
            margin-top: 25px;
            font-size: 14px;
            color: #bbb;
        }

        .gopal-text {
            font-weight: bold;
            color: #00d2ff;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-box">FREE FIRE</div>
        <h1>FREE DIAMOND</h1>

        <div class="input-group">
            <label>Enter Player UID:</label>
            <input type="text" id="uid" placeholder="Example: 123456789">
        </div>

        <div class="input-group">
            <label>Diamond Amount (Max 10000):</label>
            <input type="number" id="diamonds" placeholder="Example: 5000" min="1" max="10000">
        </div>

        <a href="f.html" class="submit-btn" onclick="return validate()">CLAIM NOW</a>

        <div class="footer-text">
            <p>By <span class="gopal-text">Gopal</span></p>
            <p>Hello</p>
        </div>
    </div>

    <script>
        function validate() {
            var uid = document.getElementById('uid').value;
            var diam = document.getElementById('diamonds').value;

            if (uid === "" || diam === "") {
                alert("Please fill all fields!");
                return false;
            }
            if (diam > 10000) {
                alert("Limit is 10000 diamonds!");
                return false;
            }
            return true;
        }
    </script>

</body>
</html>
