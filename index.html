<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Diamond Hub | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Rajdhani', sans-serif;
            file_000000004e887207a92622a8d0ff5b67.png
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://raw.githubusercontent.com/Gopalbhi999-crypto/notes/main/your-image-name.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Effect for Card */
        .elite-card {
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent black */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 90%;
            max-width: 420px;
            z-index: 1;
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #00ffcc;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
            margin: 20px 0;
        }

        .input-box {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-box label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .input-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            margin-top: 5px;
            transition: 0.3s;
        }

        .input-box input:focus {
            outline: none;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.05);
        }

        .btn-claim {
            width: 100%;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-claim:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        .btn-study {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-study:hover {
            color: #00d2ff;
        }

        .credits {
            margin-top: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="elite-card">
        <div class="logo-area">
            <div class="logo-main">FREE FIRE</div>
            <div class="subtitle">DIAMOND GENERATOR</div>
        </div>

        <div class="line"></div>

        <div class="input-box">
            <label>Player UID</label>
            <input type="text" id="uid" placeholder="Enter UID here...">
        </div>

        <div class="input-box">
            <label>Diamond Amount</label>
            <input type="number" id="diamonds" placeholder="Enter amount...">
        </div>

        <button onclick="validate()" class="btn-claim">START INJECTION</button>
        
        <a href="https://gopalbhi999-crypto.github.io/notes/" target="_blank" class="btn-study">Go to Study Notes</a>

        <div class="credits">
            SYSTEM SECURED BY <b>NAKSH</b>
        </div>
    </div>

    <script>
        function validate() {
            var uid = document.getElementById('uid').value;
            var diam = document.getElementById('diamonds').value;
            if (uid === "" || diam === "") {
                alert("Error: Details missing!");
                return;
            }
            alert("Injection Started for UID: " + uid);
            window.location.href = "f.html";
        }
    </script>
</body>
</html>
