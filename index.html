<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Diamond Hub | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Animated Background Particles */
        .bg-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #102a43 0%, #000 100%);
            z-index: -1;
        }

        .glow-overlay {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 157, 0, 0.15);
            filter: blur(120px);
            border-radius: 50%;
            top: 10%;
            left: 10%;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* Premium Elite Card */
        .elite-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center;
            width: 90%;
            max-width: 440px;
            position: relative;
            animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #ff9d00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 157, 0, 0.5));
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: -5px;
            font-weight: 700;
        }

        /* Modernized Inputs */
        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .input-box input:focus {
            outline: none;
            border-color: #ff9d00;
            background: rgba(255, 157, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 157, 0, 0.2);
        }

        /* Elite Buttons */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-claim {
            background: linear-gradient(90deg, #ff9d00, #ff5e00);
            color: #000;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(255, 94, 0, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn-study {
            background: transparent;
            color: #aaa;
            padding: 12px;
            border-radius: 15px;
            font-size: 14px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .btn-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 94, 0, 0.5);
            filter: brightness(1.1);
        }

        .btn-study:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: #00d2ff;
        }

        /* Footer Credits */
        .credits {
            margin-top: 30px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }

        .credits b {
            color: #ff9d00;
        }

        /* Decoration Lines */
        .line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,157,0,0.5), transparent);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="glow-overlay"></div>

    <div class="elite-card">
        <div class="logo-area">
            <div class="logo-main">FREE FIRE</div>
            <div class="subtitle">Diamond Vault</div>
        </div>

        <div class="line"></div>

        <div class="input-box">
            <label>Master Player UID</label>
            <input type="text" id="uid" placeholder="Example: 123456789">
        </div>

        <div class="input-box">
            <label>Select Diamond Pack</label>
            <input type="number" id="diamonds" placeholder="Up to 1,000,000,000">
        </div>

        <div class="action-area">
            <button onclick="validate()" class="btn-claim">INITIALIZE TRANSFER</button>
            <a href="https://gopalbhi999-crypto.github.io/notes/" target="_blank" class="btn-study">ACCESS STUDY PORTAL</a>
        </div>

        <div class="credits">
            DEVELOPED BY <b>NAKSH</b><br>
            SECURE ENCRYPTION ENABLED © 2026
        </div>
    </div>

    <script>
        function validate() {
            var uid = document.getElementById('uid').value;
            var diam = document.getElementById('diamonds').value;
            var maxLimit = 1000000000; 

            if (uid === "" || diam === "") {
                alert("ACCESS DENIED: Please fill all credentials.");
                return;
            }
            if (parseInt(diam) > maxLimit) {
                alert("SERVER OVERLOAD: Limit exceeded. Max 1 Billion.");
                return;
            }
            
            alert("PROTOCOL INITIATED! Processing " + diam + " Diamonds for UID: " + uid);
            window.location.href = "f.html";
        }
    </script>

</body>
</html>
